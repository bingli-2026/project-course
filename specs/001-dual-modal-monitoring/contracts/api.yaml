openapi: 3.0.3
info:
  title: Dual-Modal Monitoring API
  version: 0.3.0
  description: |
    与 feature_schema 对齐的双模态采样、特征融合与大屏展示接口。
servers:
  - url: http://localhost:8000
paths:
  /api/v1/health:
    get:
      summary: 健康检查
      responses:
        '200':
          description: OK

  /api/v1/tasks:
    post:
      summary: 创建采样与分析任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /api/v1/tasks/{task_id}:
    get:
      summary: 查询任务状态与结果摘要
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetailResponse'

  /api/v1/tasks/{task_id}/windows:
    get:
      summary: 查询窗口级分轴特征（对齐 feature_schema）
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Window features
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  samples:
                    type: array
                    items:
                      $ref: '#/components/schemas/WindowSample'

  /api/v1/tasks/{task_id}/spectra:
    get:
      summary: 查询窗口级频谱曲线（用于大屏画图）
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: string
        - in: query
          name: window_index
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Spectra data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowSpectraResponse'

  /api/v1/dashboard/overview:
    get:
      summary: 大屏概览数据
      responses:
        '200':
          description: Dashboard overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverview'

components:
  schemas:
    CreateTaskRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
        camera_mode:
          type: string
          enum: [YUY2_160x140_420fps]
          default: YUY2_160x140_420fps
        imu_sample_rate_hz:
          type: integer
          default: 1680
          minimum: 1000
          maximum: 4000
        window_size_s:
          type: number
          default: 0.25
          minimum: 0.05
        window_hop_s:
          type: number
          default: 0.05
          minimum: 0.01
        roi_x:
          type: integer
          minimum: 0
          description: 可选，ROI 左上角 x；不传则使用后端默认值
        roi_y:
          type: integer
          minimum: 0
          description: 可选，ROI 左上角 y；不传则使用后端默认值
        roi_w:
          type: integer
          minimum: 1
          description: 可选，ROI 宽度；不传则使用后端默认值
        roi_h:
          type: integer
          minimum: 1
          description: 可选，ROI 高度；不传则使用后端默认值

    TaskResponse:
      type: object
      required: [task_id, task_status, created_at]
      properties:
        task_id:
          type: string
        task_status:
          type: string
          enum: [pending, running, succeeded, failed]
        created_at:
          type: string
          format: date-time

    TaskDetailResponse:
      type: object
      required: [task_id, task_status, model_version]
      properties:
        task_id:
          type: string
        task_status:
          type: string
          enum: [pending, running, succeeded, failed]
        model_version:
          type: string
        predicted_state:
          type: string
        confidence_summary:
          type: number
          minimum: 0
          maximum: 1
        effective_window_count:
          type: integer
          minimum: 0
        sync_quality:
          type: object
          properties:
            offset_ms_p95:
              type: number
            drift_ppm:
              type: number
            aligned_window_ratio:
              type: number
              minimum: 0
              maximum: 1

    WindowSample:
      type: object
      required: [sample_id, window_index, center_time_s]
      properties:
        sample_id:
          type: string
        window_index:
          type: integer
          minimum: 0
        center_time_s:
          type: number
        imu_quality_flag:
          type: string
          enum: [ok, low_signal, missing]
        cam_quality_flag:
          type: string
          enum: [ok, blur, occlusion, missing]
        sync_fit_failed:
          type: boolean
          description: 拟合 R²<0.995 时为 true，该窗口不进入融合训练集
        seq_gap_count:
          type: integer
          minimum: 0
          description: imu_seq 跳变次数

        vision_dx_peak_hz: {type: number}
        vision_dy_peak_hz: {type: number}
        vision_dx_peak_power: {type: number}
        vision_dy_peak_power: {type: number}
        vision_dx_band_power: {type: number}
        vision_dy_band_power: {type: number}
        vision_dx_spectral_centroid_hz: {type: number}
        vision_dy_spectral_centroid_hz: {type: number}
        vision_dx_spectral_entropy: {type: number}
        vision_dy_spectral_entropy: {type: number}

        sensor_ax_peak_hz: {type: number}
        sensor_ay_peak_hz: {type: number}
        sensor_az_peak_hz: {type: number}
        sensor_gx_peak_hz: {type: number}
        sensor_gy_peak_hz: {type: number}
        sensor_gz_peak_hz: {type: number}

        sensor_ax_peak_power: {type: number}
        sensor_ay_peak_power: {type: number}
        sensor_az_peak_power: {type: number}
        sensor_gx_peak_power: {type: number}
        sensor_gy_peak_power: {type: number}
        sensor_gz_peak_power: {type: number}

        sensor_ax_band_power: {type: number}
        sensor_ay_band_power: {type: number}
        sensor_az_band_power: {type: number}
        sensor_gx_band_power: {type: number}
        sensor_gy_band_power: {type: number}
        sensor_gz_band_power: {type: number}

        sensor_ax_spectral_centroid_hz: {type: number}
        sensor_ay_spectral_centroid_hz: {type: number}
        sensor_az_spectral_centroid_hz: {type: number}
        sensor_gx_spectral_centroid_hz: {type: number}
        sensor_gy_spectral_centroid_hz: {type: number}
        sensor_gz_spectral_centroid_hz: {type: number}

        sensor_ax_spectral_entropy: {type: number}
        sensor_ay_spectral_entropy: {type: number}
        sensor_az_spectral_entropy: {type: number}
        sensor_gx_spectral_entropy: {type: number}
        sensor_gy_spectral_entropy: {type: number}
        sensor_gz_spectral_entropy: {type: number}

        fused_dominant_freq_hz:
          type: number
          description: 展示派生指标，非主分类输入
        fusion_confidence:
          type: number
          minimum: 0
          maximum: 1

    AxisSpectrum:
      type: object
      required: [freq_hz, power]
      properties:
        freq_hz:
          type: array
          items: {type: number}
        power:
          type: array
          items: {type: number}

    WindowSpectraResponse:
      type: object
      properties:
        task_id: {type: string}
        window_index: {type: integer}
        vision_dx: {$ref: '#/components/schemas/AxisSpectrum'}
        vision_dy: {$ref: '#/components/schemas/AxisSpectrum'}
        sensor_ax: {$ref: '#/components/schemas/AxisSpectrum'}
        sensor_ay: {$ref: '#/components/schemas/AxisSpectrum'}
        sensor_az: {$ref: '#/components/schemas/AxisSpectrum'}
        sensor_gx: {$ref: '#/components/schemas/AxisSpectrum'}
        sensor_gy: {$ref: '#/components/schemas/AxisSpectrum'}
        sensor_gz: {$ref: '#/components/schemas/AxisSpectrum'}

    DashboardOverview:
      type: object
      properties:
        latest_task_id: {type: string}
        latest_status: {type: string}
        latest_predicted_state: {type: string}
        latest_fused_frequency_hz: {type: number}
        active_model_version: {type: string}
        task_success_rate_24h: {type: number}
        sync_offset_ms_p95: {type: number}
